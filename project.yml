name: LofiKappa
options:
  bundleIdPrefix: com.example
packages:
  Lottie:
    url: https://github.com/airbnb/lottie-ios.git
    version: 4.4.3
targets:
  LofiKappa:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    scheme: {}
    sources:
      - path: LofiKappa
      - path: LofiKappa/.env
        buildPhase: resources
        type: file
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: "KapStation"
        INFOPLIST_KEY_CFBundleName: "KapStation"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        DEVELOPMENT_ASSET_PATHS: '"LofiKappa/Preview Content"'
        ENABLE_PREVIEWS: YES
    entitlements:
      path: LofiKappa/LofiKappa.entitlements
    dependencies:
      - target: LofiKappaWidget
      - package: Lottie
        product: Lottie
  LofiKappaWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LofiKappaWidget
      - path: LofiKappa/Models.swift
      - path: LofiKappa/Theme.swift
      - path: LofiKappa/Env.swift
      - path: LofiKappa/.env
        buildPhase: resources
        type: file
      - path: LofiKappa/SharedDatabase.swift
      - path: LofiKappa/SupabaseConfig.swift
      - path: LofiKappa/SupabaseStorageManager.swift
      - path: LofiKappa/KappaData.swift
      - path: LofiKappa/AppTexts.swift
      - path: LofiKappa/LanguageManager.swift
    info:
      path: LofiKappaWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: LofiKappaWidget/LofiKappaWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.LofiKappa.LofiKappaWidget
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: ""
        SKIP_INSTALL: YES
