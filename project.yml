name: LofiKappa
options:
  bundleIdPrefix: com.example
targets:
  LofiKappa:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    scheme: {}
    sources:
      - path: LofiKappa
      - path: LofiKappa/.env
        buildPhase: resources
        type: file
    settings:
      base:
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        DEVELOPMENT_ASSET_PATHS: '"LofiKappa/Preview Content"'
        ENABLE_PREVIEWS: YES
    dependencies:
      - target: LofiKappaWidget
  LofiKappaWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - LofiKappaWidget
    info:
      path: LofiKappaWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.LofiKappa.LofiKappaWidget
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: ""
        SKIP_INSTALL: YES
